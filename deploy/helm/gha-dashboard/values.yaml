frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/shayd3/gha-dashboard-frontend
    tag: v1.0.1
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    # nodePort: 31515  # Set when type is NodePort for a stable port
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/shayd3/gha-dashboard-backend
    tag: v1.0.1
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
    # nodePort: 31000  # Set when type is NodePort for a stable port
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

ingress:
  enabled: false
  className: nginx
  host: gha-dashboard.example.com
  tls:
    enabled: false
    secretName: gha-dashboard-tls

# Override the URL used for OAuth redirect_uri and CORS origin.
# Defaults to the ingress host when not set.
# Required when ingress is disabled (e.g. NodePort or port-forward).
# Example: "http://bread-bank:31515"
frontendUrl: ""

github:
  appClientId: ""
  appClientSecret: ""
  # Optional: needed for future installation-token features (shareable views)
  appId: ""
  appPrivateKey: ""
  apiUrl: "https://api.github.com"

jwt:
  secret: ""

database:
  # Full PostgreSQL connection string — set this for production
  # e.g. postgresql://user:pass@host:5432/gha_dashboard
  # If left empty, the backend falls back to in-memory storage (views not persisted).
  url: ""
