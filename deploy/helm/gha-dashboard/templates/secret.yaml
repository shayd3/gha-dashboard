apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  GITHUB_APP_CLIENT_ID: {{ .Values.github.appClientId | quote }}
  GITHUB_APP_CLIENT_SECRET: {{ .Values.github.appClientSecret | quote }}
  {{- if .Values.github.appId }}
  GITHUB_APP_ID: {{ .Values.github.appId | quote }}
  {{- end }}
  {{- if .Values.github.appPrivateKey }}
  GITHUB_APP_PRIVATE_KEY: {{ .Values.github.appPrivateKey | quote }}
  {{- end }}
  JWT_SECRET: {{ .Values.jwt.secret | quote }}
  DATABASE_URL: {{ .Values.database.url | quote }}
