services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gha
      POSTGRES_PASSWORD: gha
      POSTGRES_DB: gha_dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gha"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost
      - CORS_ORIGIN=http://localhost
      - DATABASE_URL=postgresql://gha:gha@db:5432/gha_dashboard
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
